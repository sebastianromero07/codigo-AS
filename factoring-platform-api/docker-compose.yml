services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: factoring
      POSTGRES_PASSWORD: factoring
      POSTGRES_DB: factoring_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factoring -d factoring_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://factoring:factoring@db:5432/factoring_platform
      APP_ENV: development
    ports:
      - "8080:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
